[package]
name = "keva_core"
version = "0.1.0"
edition = "2024"

[dependencies]
# Storage
redb = "2"

# Hashing for content-addressable blob storage
blake3 = "1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Full-text search
tantivy = "0.22"

# Fuzzy matching
nucleo = "0.5"
nucleo-matcher = "0.3"

# Error handling
thiserror = "2"

# Time handling
chrono = { version = "0.4", features = ["serde"] }

# Directory utilities
dirs = "6"

# Regex for search
regex = "1"

[dev-dependencies]
tempfile = "3.10"
